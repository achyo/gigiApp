version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: proyecto_gigi
      POSTGRES_USER: gigi_user
      POSTGRES_PASSWORD: gigi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # ✅ ya tenía persistencia
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gigi_user -d proyecto_gigi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data                         # ✅ AÑADIDO: persiste la blacklist
    command: redis-server --appendonly yes       # ✅ AOF: escribe cada operación a disco
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }   # ✅ espera a que PG esté listo de verdad
      redis:    { condition: service_healthy }
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gigi_user:gigi_password@postgres:5432/proyecto_gigi
      REDIS_URL: redis://redis:6379
    env_file: ./server/.env
    volumes:
      - ./server/src:/app/src                    # hot-reload del código fuente
      - server_node_modules:/app/node_modules   # ✅ AÑADIDO: evita que el bind mount machaque node_modules del contenedor
    command: npm run dev

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app                           # bind-mount del proyecto completo (hot-reload + assets)
      - client_node_modules:/app/node_modules   # evita que el bind mount machaque node_modules
    environment:
      - PROXY_TARGET=http://server:3000
      - CHOKIDAR_USEPOLLING=true                # enable polling for file watchers on Windows/WSL
      - VITE_USE_POLLING=true                   # optional: used if Vite config checks this var
    command: npm run dev -- --host

    # Notes:
    # - Rebuild the image when you change the Dockerfile or install native
    #   dependencies (packages in package.json that require rebuild/compile):
    #     docker-compose build client
    #     docker-compose up -d client
    # - For file-watch issues on Windows/WSL, enabling polling is effective.
    #   You already set CHOKIDAR_USEPOLLING and VITE_USE_POLLING above. If
    #   you prefer to configure Vite directly, add in client/vite.config.js:
    #
    #   export default defineConfig({
    #     server: {
    #       watch: {
    #         usePolling: true,
    #         interval: 1000,
    #       },
    #       host: true,
    #     },
    #   })
    #
    #   Lower `interval` to reduce CPU, raise it to increase reliability.

volumes:
  postgres_data:       # base de datos PostgreSQL
  redis_data:          # blacklist JWT + caché Redis
  server_node_modules: # node_modules del backend (dentro del contenedor)
  client_node_modules: # node_modules del frontend (dentro del contenedor)
